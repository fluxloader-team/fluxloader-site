name: Build and Push Docker Image

on:
    push:
        branches:
            - main

jobs:
    docker:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}:latest
                      ghcr.io/${{ github.repository }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # Modified from https://oneuptime.com/blog/post/2026-03-20-portainer-webhooks-github-actions/view
            # Modified to set the tag to the commit hash: https://docs.portainer.io/user/docker/containers/webhooks
            - name: Deploy via Portainer webhook
              run: |
                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                      -X POST \
                      --max-time 30 \
                      "${{ secrets.PORTAINER_WEBHOOK_URL }}?tag=${{ github.sha }}")

                  if [ "$HTTP_STATUS" == "204" ]; then
                      echo "✓ Deployment triggered successfully"
                  else
                      echo "✗ Deployment trigger failed: HTTP $HTTP_STATUS"
                      exit 1
                  fi
